name: 🛡️ Enterprise Quality Governance Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  # --- JOB 1: API RESILIENCY ---
  api-testing:
    name: 🔌 API Functional & Resiliency
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🧪 Run API Tests
        working-directory: ecommerce-demoblaze/demoblaze-tests
        run: |
          mvn clean test \
            -DsuiteXmlFile=src/test/resources/testng-api.xml \
            -Denv=qa

      - name: 📦 Archive API Artifacts
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: api-results
          # FIXED: Added the correct path relative to repository root
          path: ecommerce-demoblaze/demoblaze-tests/target/surefire-reports/

  # --- JOB 2: UI & DAST ---
  ui-and-security:
    name: 🖥️ UI & DAST Security Suite
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🛡️ Start ZAP Proxy
        run: |
          docker run -d --name zap-proxy -p 8080:8080 \
            -e ZAP_AUTH_HEADER_VALUE="none" \
            --user root \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -daemon -host 0.0.0.0 -port 8080 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true
          timeout 60s bash -c 'until curl -s http://localhost:8080; do sleep 5; done'

      - name: 🧪 Run UI Tests
        working-directory: ecommerce-demoblaze/demoblaze-tests
        run: |
          mvn clean test \
            -DsuiteXmlFile=src/test/resources/testng-ui.xml \
            -Dheadless=true \
            -Denv=qa \
            -DproxyHost=localhost -DproxyPort=8080

      - name: 📦 Archive UI Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-results
          # FIXED: Added the correct path relative to repository root
          path: ecommerce-demoblaze/demoblaze-tests/target/surefire-reports/

  # --- JOB 3: SONARCLOUD GOVERNANCE ---
  governance:
    name: 📊 SonarCloud Governance
    needs: [api-testing, ui-and-security]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛡️ SonarCloud Analysis
        working-directory: ecommerce-demoblaze/demoblaze-tests
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn clean test-compile sonar:sonar \
            -Dsonar.token=$SONAR_TOKEN \
            -DskipTests=true
        # NEW: This step pauses the pipeline until SonarCloud reports back
      - name: 🛑 SonarCloud Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: 📊 Final Consolidated Quality Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-quality-bundle
          # FIXED: Pointed to the actual target folder generated in this job
          path: ecommerce-demoblaze/demoblaze-tests/target/
          retention-days: 2
