version: "3"

services:
  selenium-hub:
    image: selenium/hub:4.25.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 5s
      timeout: 5s
      retries: 5

  chrome:
    image: selenium/node-chrome:4.25.0
    shm_size: 2gb
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  # --- THE SOVEREIGN TEST RUNNER ---
  # PROBLEM: Manually running 'mvn test' requires local Java/Maven setup and manual timing.
  # SOLUTION: I integrated the Audit Engine directly into the Compose orchestration.
  # RESULT: A "Single-Command Audit" (docker-compose up) that handles Grid boot, 
  #         Security Proxying, and Test Execution automatically.
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test-runner
    depends_on:
      selenium-hub:
        condition: service_healthy
    environment:
      - SHARD_ID=1      # Change this to run different shards locally
      - ENV_TARGET=qa
      - HEADLESS=true
      - REMOTE_URL=http://selenium-hub:4444/wd/hub
    # PROBLEM: Test reports disappear when the container stops.
    # SOLUTION: I mapped a Volume to persist reports to the host machine.
    # RESULT: Instant access to ExtentReports and TestNG results on the dev machine.
    volumes:
      - ./ecommerce-demoblaze/demoblaze-tests/target:/app/target
