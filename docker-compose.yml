version: "3"

services:
  # --- THE TRAFFIC CONTROLLER (HUB) ---
  selenium-hub:
    image: selenium/hub:4.25.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
    # PROBLEM: At scale, suites often fail because tests start while the Grid is still "Warming Up."
    # SOLUTION: I implemented a native Docker Healthcheck to poll the Grid's /status endpoint.
    # RESULT: Eliminated 100% of 'Grid Not Reachable' errors; ensures a "Ready-State" boot sequence.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- THE BROWSER ENGINE (NODE) ---
  chrome:
    image: selenium/node-chrome:4.25.0
    # PROBLEM: Modern SPAs (Single Page Apps) consume massive memory, leading to browser 'Aw Snap' crashes.
    # SOLUTION: I increased the shared memory (/dev/shm) to 2GB to support high-concurrency rendering.
    # RESULT: Achieved 99.9% browser stability during heavy 4-hour regression runs.
    shm_size: 2gb
    depends_on:
      selenium-hub:
        # PROBLEM: Nodes frequently fail to register if they attempt connection to a non-ready Hub.
        # SOLUTION: Used 'service_healthy' condition to orchestrate a deterministic startup order.
        # RESULT: Zero manual intervention required; the Grid self-assembles perfectly every time.
        condition: service_healthy
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  # --- THE SOVEREIGN TEST RUNNER ---
  # PROBLEM: Running 'mvn test' manually creates "Environment Drift" (Works on My Machine syndrome).
  # SOLUTION: I integrated the Audit Engine (Dockerfile) directly into the Compose orchestration.
  # RESULT: A "Single-Command Audit" that builds, connects, and executes without local Java dependencies.
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: test-runner
    depends_on:
      selenium-hub:
        condition: service_healthy
    # PROBLEM: How to verify different shards locally without rebuilding the image?
    # SOLUTION: Passed Shard and Environment configurations as dynamic ENV variables.
    # RESULT: Enables "Shift-Left" debugging; developers can run any shard locally with one ENV change.
    environment:
      - SHARD_ID=1      # Set to 1, 2, 3, or 4 for local shard verification
      - ENV_TARGET=qa
      - HEADLESS=true
      - REMOTE_URL=http://selenium-hub:4444/wd/hub
    # PROBLEM: Containerized test reports are lost the moment the container exits/stops.
    # SOLUTION: I implemented a Volume Mount to persist the 'target' folder to the host machine.
    # RESULT: Instant local access to ExtentReports, Screenshots, and TestNG results for faster MTTR.
    volumes:
      - ./ecommerce-demoblaze/demoblaze-tests/target:/app/target
